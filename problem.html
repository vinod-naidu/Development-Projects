<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Detail - DSA Revision Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" style="text-decoration: none;">
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg); margin-right: 0.5rem;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                Back to Dashboard
            </h1>
        </a>
    </header>

    <main class="container" style="max-width: 900px; padding-top: 3rem;">
        <div id="loadingState" class="text-center" style="display: none;">
            <p>Loading solution...</p>
        </div>
        
        <div id="details" class="problem-detail" style="display: none;">
            <div class="detail-header">
                <h2 class="detail-title" id="pDetailTitle">Loading...</h2>
                <div class="detail-meta">
                    <span id="pDetailBadge" class="badge">--</span>
                    <span class="card-topic" style="margin: 0; font-size: 1rem;">
                        <svg class="topic-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <span id="pDetailPattern">Loading...</span>
                    </span>
                    <span style="color: var(--text-secondary); font-size: 0.9rem;" id="pDetailDate">--</span>
                </div>
            </div>

            <!-- Description / Approach -->
            <h3 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                Approach & Intuition
            </h3>
            <div class="description-box" id="pDetailApproach">
                <!-- Approach injected here -->
            </div>

            <!-- Code Viewing -->
            <h3 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                Solution Snippet
            </h3>
            <div class="code-container">
                <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Code</button>
                <pre><code class="language-python" id="pDetailCode"></code></pre>
            </div>
            
            <div class="mt-4" style="text-align: right;">
                <button class="btn-secondary" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.3);" onclick="deleteProblem()">Delete Problem</button>
            </div>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="Data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    
    <script>
        let currentProblemId = null;
        let problemData = null;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            currentProblemId = parseInt(params.get("id"));
            
            if (!currentProblemId) {
                alert("No problem ID provided.");
                window.location.href = "index.html";
                return;
            }

            const problems = loadProblems();
            problemData = problems.find(p => p.id === currentProblemId);

            if (!problemData) {
                alert("Problem not found.");
                window.location.href = "index.html";
                return;
            }

            // Populate UI
            document.getElementById('pDetailTitle').textContent = problemData.title;
            document.getElementById('pDetailPattern').textContent = problemData.pattern;
            document.getElementById('pDetailApproach').textContent = problemData.approach || problemData.description || "No specific approach noted.";
            document.getElementById('pDetailCode').textContent = problemData.code || "";
            
            const diffClass = problemData.difficulty.toLowerCase();
            const badge = document.getElementById('pDetailBadge');
            badge.textContent = problemData.difficulty;
            badge.className = `badge ${diffClass}`;

            if(problemData.timestamp) {
                document.getElementById('pDetailDate').textContent = new Date(problemData.timestamp).toLocaleDateString();
            }

            document.getElementById('details').style.display = 'block';

            // Identify simple language guessing for prism
            const codeBlock = document.getElementById('pDetailCode');
            const codeContent = problemData.code.toLowerCase();
            if (codeContent.includes("def ") || codeContent.includes("print(")) {
                codeBlock.className = 'language-python';
            } else if (codeContent.includes("function") || codeContent.includes("console.log")) {
                codeBlock.className = 'language-javascript';
            } else if (codeContent.includes("public class") || codeContent.includes("System.out")) {
                codeBlock.className = 'language-java';
            } else if (codeContent.includes("#include")) {
                codeBlock.className = 'language-cpp';
            }

            // Force syntax highlighting
            Prism.highlightElement(codeBlock);
        });

        function copyCode() {
            if(!problemData) return;
            navigator.clipboard.writeText(problemData.code).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = "Copied!";
                btn.style.background = "var(--success)";
                setTimeout(() => {
                    btn.textContent = "Copy Code";
                    btn.style.background = "rgba(255, 255, 255, 0.1)";
                }, 2000);
            });
        }
        
        function deleteProblem() {
            if(confirm("Are you sure you want to delete this problem?")) {
                let problems = loadProblems();
                problems = problems.filter(p => p.id !== currentProblemId);
                saveProblems(problems);
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
