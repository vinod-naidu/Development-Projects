<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Revision Hub</title>
    <!-- SEO and Meta tags -->
    <meta name="description" content="A professional platform to organize and revise LeetCode problems and Data Structure solutions.">
    <link rel="stylesheet" href="style.css">
    <!-- SVGs mapping logic in script usually, but direct inclusion here saves requests -->
</head>
<body>

    <!-- Professional Navigation Bar -->
    <header>
        <h1 onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            DSA Revision
        </h1>
        <div class="auth-buttons">
            <button class="btn-primary" id="openAddModalBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; margin-top: -2px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Problem
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Controls Section -->
        <section class="controls">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search by problem title or pattern...">
            </div>
            
            <div class="filters" id="difficultyFilters">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Easy">Easy</button>
                <button class="filter-btn" data-filter="Medium">Medium</button>
                <button class="filter-btn" data-filter="Hard">Hard</button>
            </div>
        </section>

        <!-- Problems Grid -->
        <section class="grid" id="problemList">
            <!-- Problem Cards will be injected here dynamically -->
        </section>
    </main>

    <!-- Add Problem Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add New Solution</h2>
                <button class="close-btn" id="closeAddModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addProblemForm">
                    <div class="form-group">
                        <label for="pTitle">Problem Title</label>
                        <input type="text" id="pTitle" class="form-control" required placeholder="e.g., Two Sum">
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 2;">
                            <label for="pPattern">Pattern / Topic</label>
                            <input type="text" id="pPattern" class="form-control" required placeholder="e.g., Sliding Window, Graphs">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="pDifficulty">Difficulty</label>
                            <select id="pDifficulty" class="form-control" required style="background: var(--bg-primary);">
                                <option value="Easy">Easy</option>
                                <option value="Medium">Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="pApproach">Approach (Optional)</label>
                        <input type="text" id="pApproach" class="form-control" placeholder="Brief 1-line recap of the intuition">
                    </div>

                    <div class="form-group">
                        <label for="pCode">Solution Code</label>
                        <textarea id="pCode" class="form-control" required rows="6" placeholder="Paste your clean, well-commented code here..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelAddBtn">Cancel</button>
                <button class="btn-primary" id="saveProblemBtn">Save Solution</button>
            </div>
        </div>
    </div>

    <script src="Data.js"></script>
    <script src="script.js"></script>
</body>
</html>
